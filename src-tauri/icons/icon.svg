<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#5185b2"/>
      <stop offset="100%" stop-color="#2b4f78"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background (macOS squircle) -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle top shine -->
  <ellipse cx="512" cy="80" rx="380" ry="120" fill="white" opacity="0.07"/>

  <!-- Ψ rendered via system font for pixel-perfect glyph at all sizes -->
  <text
    x="512"
    y="760"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="650"
    font-weight="bold"
    fill="white"
    opacity="0.95"
  >Ψ</text>
</svg>
